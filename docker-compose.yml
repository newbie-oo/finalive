services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finalive-app
    restart: unless-stopped
    ports: ["3000:3000"]
    env_file: [.env]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://finalive:dev@db:5432/finalive
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      S3_ENDPOINT: http://minio:9000
      BETTER_AUTH_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started

  db:
    image: postgres:16-alpine
    container_name: finalive-db
    restart: unless-stopped
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: finalive
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: finalive
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finalive"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit
    container_name: finalive-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  minio:
    image: minio/minio
    container_name: finalive-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniodev
    command: server /data --console-address ":9001"
    volumes: [miniodata:/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  miniodata:
